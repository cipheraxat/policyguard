# Test profile: Testcontainers drives datasource and Redis URLs via @DynamicPropertySource.
# These placeholder properties are overridden at test runtime.

spring:
  datasource:
    url: ${TEST_DATASOURCE_URL:jdbc:postgresql://localhost:5432/policyguard}
    username: ${TEST_DATASOURCE_USERNAME:policyguard}
    password: ${TEST_DATASOURCE_PASSWORD:policyguard}

  data:
    redis:
      host: ${TEST_REDIS_HOST:localhost}
      port: ${TEST_REDIS_PORT:6379}

  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    placeholders:
      embedding_dim: ${policyguard.embedding.dim:1536}
